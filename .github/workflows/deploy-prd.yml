name: Deploy to PRD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to homeserver (prd)
    runs-on: self-hosted
    environment: production

    steps:
      - name: Capture pre-deploy state
        run: |
          PORT=$(python3 -c "import json; print(json.load(open('/opt/latarnia/prd/config/config.json'))['system']['main_port'])")
          echo "PORT=$PORT" >> $GITHUB_ENV
          PRE_HEALTH=$(curl -sf --max-time 5 http://localhost:$PORT/health | python3 -c "import sys,json; print(json.load(sys.stdin)['health'])" 2>/dev/null || echo "unavailable")
          PRE_COUNT=$(curl -sf --max-time 5 http://localhost:$PORT/api/apps | python3 -c "import sys,json; print(json.load(sys.stdin)['total_count'])" 2>/dev/null || echo "-1")
          echo "PRE_HEALTH=$PRE_HEALTH" >> $GITHUB_ENV
          echo "PRE_COUNT=$PRE_COUNT" >> $GITHUB_ENV
          echo "Pre-deploy: health=$PRE_HEALTH, apps=$PRE_COUNT"

      - name: Backup deploy folder
        run: |
          BACKUP_DIR="/opt/latarnia/backups/prd"
          mkdir -p "$BACKUP_DIR"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          rsync -a --exclude='.git' /opt/latarnia/prd/ "$BACKUP_DIR/$TIMESTAMP/"
          ls -1t "$BACKUP_DIR" | tail -n +6 | xargs -I {} rm -rf "$BACKUP_DIR/{}"

      - name: Pull latest code
        run: |
          cd /opt/latarnia/prd
          git fetch
          git reset --hard origin/main

      - name: Restart PRD service
        run: sudo systemctl restart latarnia-prd.service

      - name: Verify post-deploy health
        run: |
          echo "Pre-deploy state: health=$PRE_HEALTH, apps=$PRE_COUNT"
          for i in $(seq 1 12); do
            POST_HEALTH=$(curl -sf --max-time 5 http://localhost:$PORT/health | python3 -c "import sys,json; print(json.load(sys.stdin)['health'])" 2>/dev/null || echo "")
            POST_COUNT=$(curl -sf --max-time 5 http://localhost:$PORT/api/apps | python3 -c "import sys,json; print(json.load(sys.stdin)['total_count'])" 2>/dev/null || echo "")
            if [ -n "$POST_HEALTH" ] && [ -n "$POST_COUNT" ]; then
              break
            fi
            echo "Waiting for service... ($i/12)"
            sleep 5
          done
          echo "Post-deploy: health=$POST_HEALTH, apps=$POST_COUNT"
          if [ -z "$POST_HEALTH" ]; then
            echo "ERROR: Service did not respond after 60s"
            exit 1
          fi
          if [ "$POST_HEALTH" = "error" ]; then
            echo "ERROR: Platform health is 'error' after deploy"
            exit 1
          fi
          if [ "$PRE_COUNT" != "-1" ] && [ "$POST_COUNT" -lt "$PRE_COUNT" ]; then
            echo "ERROR: App count dropped from $PRE_COUNT to $POST_COUNT"
            exit 1
          fi
          echo "Deploy verified: health=$POST_HEALTH, apps=$POST_COUNT"
