<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Latarnia — Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <style>
    body { background:#f8f9fa; display:flex; min-height:100vh; align-items:center; }
    .login-card { max-width: 400px; width:100%; }
  </style>
</head>
<body>
  <main class="container">
    <div class="card login-card shadow-sm mx-auto">
      <div class="card-body p-4">
        <h1 class="h4 mb-1 text-center">Latarnia</h1>
        <p class="text-muted small text-center mb-3">
          Enter your username and the 6-digit code from your authenticator app.
        </p>

        {% if error %}
        <div class="alert alert-danger py-2 small" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="/auth/login{% if next %}?next={{ next | urlencode }}{% endif %}">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username"
                   autocomplete="username" required autofocus />
          </div>
          <div class="mb-3">
            <label for="code" class="form-label">6-digit code</label>
            <input type="text" class="form-control text-center" id="code" name="code"
                   inputmode="numeric" maxlength="6" autocomplete="one-time-code"
                   pattern="[0-9]{6}" required />
          </div>
          <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
